{% extends "base.html" %}
{% block title %}Register — MARS Reporter{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2>Register</h2>
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/register">
            <label for="callsign">Callsign</label>
            <input type="text" id="callsign" name="callsign" placeholder="AAR4XX" required autofocus>
            <label for="platoon">Platoon</label>
            <select id="platoon" name="platoon" required>
                <option value="">— Select —</option>
                {% for p in platoons %}
                <option value="{{ p }}">{{ p }}</option>
                {% endfor %}
            </select>
            <label for="password">Password (min 6 characters)</label>
            <input type="password" id="password" name="password" minlength="6" required>
            <button type="submit" class="btn btn-primary" style="width:100%">Register</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.85rem; text-align: center;">
            Already registered? <a href="/login" style="color: #e94560;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
